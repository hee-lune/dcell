run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - prealloc
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/heelune/dcell
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
